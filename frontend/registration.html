<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tushar Vatsa | Chat</title>
    <link rel="stylesheet" href="../styles/registrationStyle.css">
</head>
<body>
    <div class="signup-container">
        <div class="signup-title">
            <img src="" alt="" class="signup-title-image">
            <div class="signup-title-text">Signup to talk with Tushar</div>
        </div>
        <div class="signup-form">
            <div class="signup-name form-internal">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="signup-org form-internal">
                <label for="org">Organization</label>
                <input type="text" id="org" name="org" required>
            </div>
            <div class="signup-email form-internal">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="signup-password form-internal">
                <label for="pass">Email</label>
                <input type="password" id="pass" name="pass" required>
            </div>
            <button type="button" id="signup-button">Signup</button>
        </div>
        <div class="signup-login">Already have an account?&ThickSpace;<a href="login.html">Login</a></div>

    </div>
</body>
</html>
